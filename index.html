<!DOCTYPE html>
<html>
<head>
<title>Study App Pro</title>

<style>
body {
    margin: 0;
    font-family: -apple-system;
    display: flex;
    justify-content: center;
    transition: 0.3s;
}

.light { background: #f2f2f7; color: black; }
.dark { background: #000; color: white; }
.pink { background: linear-gradient(135deg, #ff9a9e, #fad0c4); }

.app { width: 380px; padding: 20px; }

.card {
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.7);
}

.dark .card { background: #1c1c1e; }

input, textarea, select {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: #007aff;
    color: white;
}

.timer {
    font-size: 48px;
    text-align: center;
}

.chat-box {
    height: 120px;
    overflow-y: auto;
    font-size: 14px;
}
</style>
</head>

<body class="light" id="body">

<div class="app">

<h2>📚 Study App Pro</h2>

<!-- THEMES -->
<div class="card">
<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('pink')">Pink</button>
</div>

<!-- TIMER -->
<div class="card">
<div class="timer" id="timer">25:00</div>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
<p>Sessions: <span id="sessions">0</span></p>
</div>

<!-- AI ASSISTANT -->
<div class="card">
<h3>🤖 Assistant</h3>
<input id="userInput" placeholder="Ask something...">
<button onclick="askAI()">Ask</button>
<div id="chat" class="chat-box"></div>
</div>

<!-- SUMMARISER -->
<div class="card">
<h3>📄 Summariser</h3>

<textarea id="textInput" placeholder="Paste notes, document, or YouTube description here..."></textarea>

<input id="youtubeLink" placeholder="Paste YouTube link (optional)">

<button onclick="summarise()">Summarise</button>

<div id="summary"></div>
</div>

</div>

<script>
// TIMER
let time = parseInt(localStorage.getItem("time")) || 1500;
let sessions = parseInt(localStorage.getItem("sessions")) || 0;
let running = false, interval;

document.getElementById("sessions").innerText = sessions;

function updateTimer(){
let m=Math.floor(time/60), s=time%60;
if(s<10)s="0"+s;
document.getElementById("timer").innerText=m+":"+s;
}
updateTimer();

function startTimer(){
if(running)return;
running=true;
interval=setInterval(()=>{
time--;
localStorage.setItem("time",time);
updateTimer();
if(time<=0){
sessions++;
localStorage.setItem("sessions",sessions);
document.getElementById("sessions").innerText=sessions;
time=1500;
}
},1000);
}
function pauseTimer(){clearInterval(interval);running=false;}
function resetTimer(){
clearInterval(interval);
running=false;
time=1500;sessions=0;
localStorage.setItem("time",time);
localStorage.setItem("sessions",sessions);
updateTimer();
document.getElementById("sessions").innerText=0;
}

// THEMES
function setTheme(t){
document.getElementById("body").className=t;
}

// SIMPLE AI
function askAI(){
let input=document.getElementById("userInput").value.toLowerCase();
let chat=document.getElementById("chat");

let res="Try asking about science, math, or studying.";

if(input.includes("photosynthesis"))
res="Plants use sunlight, water, and CO2 to make food and oxygen.";

else if(input.includes("fraction"))
res="Fractions show parts of a whole, like 1/2.";

else if(input.includes("study"))
res="Use 25 min focus sessions with short breaks.";

chat.innerHTML+="<p><b>You:</b> "+input+"</p>";
chat.innerHTML+="<p><b>AI:</b> "+res+"</p>";
}

// SUMMARISER
function summarise(){
let text=document.getElementById("textInput").value;
let link=document.getElementById("youtubeLink").value;
let output="";

// SIMPLE SUMMARY: take first sentences
if(text.length>0){
let sentences=text.split(".");
output=sentences.slice(0,3).join(".") + ".";
}

// YOUTUBE HANDLING
if(link.includes("youtube")){
output += "<br><br>📺 Video detected. Paste description for better summary.";
}

document.getElementById("summary").innerHTML=output || "Nothing to summarise.";
}
</script>

</body>
</html>
